syntax = "proto3";

option go_package = "github.com/ikithomas/iki-proto/ikipb/iki_event";

package ticket;

message User {
  string id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 4;
}

message Comment {
  string id = 1;
  string content = 2;
  User author = 3;
}

message Ticket {
  string id = 1;
  string title = 2;
  optional string content = 3;
  string state_key = 4;
  optional int64 due_at = 5;
  User creator = 6;
  optional User assignee = 7;
  repeated Comment comments = 8;
}

message EventTicketCreated {
  Ticket ticket = 1;
}

message EventTicketUpdated {
  Ticket ticket = 1;
}

message EventTicketStateUpdated {
  string ticket_id = 1;
}

message EventTicketCommented {
  string ticket_id = 1;
  Comment comment = 2;
}
