syntax = "proto3";

import "buf/validate/validate.proto";
import "google/protobuf/any.proto";

option go_package = "github.com/ikithomas/iki-proto/ikipb/iki_event";
option ruby_package = "Iki::Event";

package event;

message Envelope {
  string event_id             = 1 [(buf.validate.field).string.uuid = true];
  string event_type           = 2 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Any payload = 3 [(buf.validate.field).required = true];
}
