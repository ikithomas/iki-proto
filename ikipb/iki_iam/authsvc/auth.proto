syntax = "proto3";

import "ikipb/iki_iam/iam.proto";

option go_package = "/authsvc";
option ruby_package = "Iki::Iam::AuthSvc";

package authsvc;

service AuthSvc {
  // Login or signup with google.
  // If a user is not yet created, a new user account will be created associated with that email address.
  rpc GoogleLogin (GoogleLoginRequest) returns (GoogleLoginResponse) {}

  rpc ServiceLogin (ServiceLoginRequest) returns (ServiceLoginResponse) {}

  rpc Signout (SignoutRequest) returns (SignoutResponse) {}

  // Passkey (WebAuthn) registration — requires an active session.
  rpc BeginPasskeyRegistration (BeginPasskeyRegistrationRequest) returns (BeginPasskeyRegistrationResponse) {}
  rpc FinishPasskeyRegistration (FinishPasskeyRegistrationRequest) returns (FinishPasskeyRegistrationResponse) {}

  // Passkey (WebAuthn) authentication.
  rpc BeginPasskeyLogin (BeginPasskeyLoginRequest) returns (BeginPasskeyLoginResponse) {}
  rpc FinishPasskeyLogin (FinishPasskeyLoginRequest) returns (FinishPasskeyLoginResponse) {}

  // List all registered passkeys, optionally filtered by user_id.
  rpc ListPasskeys (ListPasskeysRequest) returns (ListPasskeysResponse) {}

  // Delete a registered passkey by its ID.
  rpc DeletePasskey (DeletePasskeyRequest) returns (DeletePasskeyResponse) {}
}

message GoogleLoginRequest {
  string id_token = 1;
}

message GoogleLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  iam.User user = 3;
}

message ServiceLoginRequest {
  string client_id = 1;
  string client_secret = 2;
}

message ServiceLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message SignoutRequest {}
message SignoutResponse {}

message BeginPasskeyRegistrationRequest {}
message BeginPasskeyRegistrationResponse {
  string options_json = 1;
  string session_id = 2;
}

message FinishPasskeyRegistrationRequest {
  string session_id = 1;
  string credential_json = 2;
  string name = 3;
}
message FinishPasskeyRegistrationResponse {}

message BeginPasskeyLoginRequest {
  string email = 1;
}
message BeginPasskeyLoginResponse {
  string options_json = 1;
  string session_id = 2;
}

message FinishPasskeyLoginRequest {
  string session_id = 1;
  string credential_json = 2;
}
message FinishPasskeyLoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  iam.User user = 3;
}

message ListPasskeysRequest {}

message ListPasskeysResponse {
  repeated iam.Passkey passkeys = 1;
}

message DeletePasskeyRequest {
  string id = 1;
}

message DeletePasskeyResponse {}
