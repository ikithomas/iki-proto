syntax = "proto3";

import "ikipb/iki_iam/iam.proto";

option go_package = "/usersvc";

package usersvc;

service UserSvc {
  // Profile returns the user profile associated with the access token associated with the request.
  rpc Profile(ProfileRequest) returns (ProfileResponse) {}

  // CheckEmail checks if the account is already taken.
  rpc CheckEmail(CheckEmailRequest) returns (CheckEmailResponse) {}

  // Create a user
  rpc Create(CreateRequest) returns (CreateResponse) {}

  // List lists all users.
  rpc List(ListRequest) returns (ListResponse) {}

  // Get gets the details of a specific user.
  rpc Get(GetRequest) returns (GetResponse) {}

  // Delete delete a user.
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}

  // UpdateGroups updates the groups of the user.
  rpc UpdateGroups (UpdateGroupRequest) returns (UpdateGroupResponse) {}

  rpc ActivateUser (ActivateUserRequest) returns (ActivateUserResponse) {}

  rpc DeactivateUser (DeactivateUserRequest) returns (DeactivateUserResponse) {}

  // ListPasskeys lists all registered passkeys, optionally filtered by user.
  rpc ListPasskeys(ListPasskeysRequest) returns (ListPasskeysResponse) {}

  // DeletePasskey deletes a passkey by its ID.
  rpc DeletePasskey(DeletePasskeyRequest) returns (DeletePasskeyResponse) {}
}

message ProfileRequest {}

message ProfileResponse {
  iam.User user = 1;
}

message CheckEmailRequest {
  string email = 1;
}

message CheckEmailResponse {
  bool exist = 1;
}

message CreateRequest {
  string email = 1;
  string given_name = 2;
  string family_name = 3;
}

message CreateResponse {
  iam.User user = 1;
}

message GetRequest {
  string id = 1;
}
message GetResponse {
  iam.User user = 1;
}

message ListRequest {}

message ListResponse {
  repeated iam.User users = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}

message UpdateGroupRequest {
  string user_id = 1;
  repeated string group_ids = 2;
}

message UpdateGroupResponse {}

message ActivateUserRequest {
  string id = 1;
}

message ActivateUserResponse {}

message DeactivateUserRequest {
  string id = 1;
}

message DeactivateUserResponse {}

message Passkey {
  string id = 1;
  string owner_id = 2;
  string owner_name = 3;
  string identifier = 4;
  int64 created_at = 5;
  optional int64 last_used_at = 6;
}

message ListPasskeysRequest {
  optional string user_id = 1;
}

message ListPasskeysResponse {
  repeated Passkey passkeys = 1;
}

message DeletePasskeyRequest {
  string id = 1;
}

message DeletePasskeyResponse {}
