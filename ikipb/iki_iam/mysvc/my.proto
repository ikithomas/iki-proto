syntax = "proto3";

import "ikipb/iki_iam/iam.proto";

option go_package = "/mysvc";
option ruby_package = "Iki::Iam::MySvc";

package mysvc;

service MySvc {
  // Profile
  rpc GetMyProfile (GetMyProfileRequest) returns (GetMyProfileResponse) {}
  rpc PatchMyProfile (PatchMyProfileRequest) returns (PatchMyProfileResponse) {}

  // Passkeys
  rpc ListMyPasskeys (ListMyPasskeysRequest) returns (ListMyPasskeysResponse) {}
  rpc BeginPasskeyRegistration (BeginPasskeyRegistrationRequest) returns (BeginPasskeyRegistrationResponse) {}
  rpc FinishPasskeyRegistration (FinishPasskeyRegistrationRequest) returns (FinishPasskeyRegistrationResponse) {}
  rpc DeleteMyPasskey (DeleteMyPasskeyRequest) returns (DeleteMyPasskeyResponse) {}
}

////////////////////////////////////////////////////////////////////////////////
// Profile
//////

message GetMyProfileRequest {}

message GetMyProfileResponse {
  iam.UserDetail user = 1;
}

message PatchMyProfileRequest {
  optional string given_name  = 1;
  optional string family_name = 2;
}

message PatchMyProfileResponse {
  iam.User user = 1;
}

////////////////////////////////////////////////////////////////////////////////
// Passkeys
//////

message ListMyPasskeysRequest {}

message ListMyPasskeysResponse {
  repeated iam.Passkey passkeys = 1;
}

message BeginPasskeyRegistrationRequest {}

message BeginPasskeyRegistrationResponse {
  string options_json = 1;
  string session_id   = 2;
}

message FinishPasskeyRegistrationRequest {
  string session_id      = 1;
  string credential_json = 2;
  string name            = 3;
}

message FinishPasskeyRegistrationResponse {
  iam.Passkey passkey = 1;
}

message DeleteMyPasskeyRequest {
  string id = 1;
}

message DeleteMyPasskeyResponse {}
