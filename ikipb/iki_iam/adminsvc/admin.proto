syntax = "proto3";

import "buf/validate/validate.proto";
import "ikipb/iki_iam/iam.proto";

option go_package = "/adminsvc";
option ruby_package = "Iki::Iam::AdminSvc";

package adminsvc;

service AdminSvc {
  // User management
  rpc ListUsers (ListUsersRequest) returns (ListUsersResponse) {}
  rpc GetUser (GetUserRequest) returns (GetUserResponse) {}
  rpc PatchUser (PatchUserRequest) returns (PatchUserResponse) {}
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse) {}
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse) {}
  rpc SetUserRoles (SetUserRolesRequest) returns (SetUserRolesResponse) {}
  rpc SetUserGroups (SetUserGroupsRequest) returns (SetUserGroupsResponse) {}

  // Permission management
  rpc ListPermissions (ListPermissionsRequest) returns (ListPermissionsResponse) {}
  rpc GetPermission (GetPermissionRequest) returns (GetPermissionResponse) {}
  rpc CreatePermission (CreatePermissionRequest) returns (CreatePermissionResponse) {}
  rpc PatchPermission (PatchPermissionRequest) returns (PatchPermissionResponse) {}
  rpc DeletePermission (DeletePermissionRequest) returns (DeletePermissionResponse) {}

  // Group management
  rpc ListGroups (ListGroupsRequest) returns (ListGroupsResponse) {}
  rpc GetGroup (GetGroupRequest) returns (GetGroupResponse) {}
  rpc CreateGroup (CreateGroupRequest) returns (CreateGroupResponse) {}
  rpc PatchGroup (PatchGroupRequest) returns (PatchGroupResponse) {}
  rpc DeleteGroup (DeleteGroupRequest) returns (DeleteGroupResponse) {}

  // Role management
  rpc ListRoles (ListRolesRequest) returns (ListRolesResponse) {}
  rpc GetRole (GetRoleRequest) returns (GetRoleResponse) {}
  rpc CreateRole (CreateRoleRequest) returns (CreateRoleResponse) {}
  rpc PatchRole (PatchRoleRequest) returns (PatchRoleResponse) {}
  rpc DeleteRole (DeleteRoleRequest) returns (DeleteRoleResponse) {}

  // Role ↔ Permission bindings
  rpc SetRolePermissions (SetRolePermissionsRequest) returns (SetRolePermissionsResponse) {}

  // Group ↔ Role bindings
  rpc SetGroupRoles (SetGroupRolesRequest) returns (SetGroupRolesResponse) {}

  // User ↔ Group bindings
  rpc AddUserToGroup (AddUserToGroupRequest) returns (AddUserToGroupResponse) {}
  rpc RemoveUserFromGroup (RemoveUserFromGroupRequest) returns (RemoveUserFromGroupResponse) {}
  rpc ListGroupUsers (ListGroupUsersRequest) returns (ListGroupUsersResponse) {}

  // Passkey management
  rpc ListPasskeys (ListPasskeysRequest) returns (ListPasskeysResponse) {}
  rpc DeletePasskey (DeletePasskeyRequest) returns (DeletePasskeyResponse) {}

  // Service management
  rpc ListServices (ListServicesRequest) returns (ListServicesResponse) {}
  rpc GetService (GetServiceRequest) returns (GetServiceResponse) {}
  rpc CreateService (CreateServiceRequest) returns (CreateServiceResponse) {}
  rpc DeleteService (DeleteServiceRequest) returns (DeleteServiceResponse) {}
  rpc AddServiceSecret (AddServiceSecretRequest) returns (AddServiceSecretResponse) {}
  rpc ActivateServiceSecret (ActivateServiceSecretRequest) returns (ActivateServiceSecretResponse) {}
  rpc DeactivateServiceSecret (DeactivateServiceSecretRequest) returns (DeactivateServiceSecretResponse) {}
  rpc DeleteServiceSecret (DeleteServiceSecretRequest) returns (DeleteServiceSecretResponse) {}
}

////////////////////////////////////////////////////////////////////////////////
// Permission management
//////

message ListPermissionsRequest {}

message ListPermissionsResponse {
  repeated iam.Permission permissions = 1;
}

message GetPermissionRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetPermissionResponse {
  iam.PermissionDetail permission = 1;
}

message CreatePermissionRequest {
  string name        = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  string external_id = 2 [(buf.validate.field).string.max_len = 255];
}

message CreatePermissionResponse {
  iam.Permission permission = 1;
}

message PatchPermissionRequest {
  string id                   = 1 [(buf.validate.field).string.uuid = true];
  optional string name        = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  optional string external_id = 3 [(buf.validate.field).string = {max_len: 255}];
}

message PatchPermissionResponse {
  iam.Permission permission = 1;
}

message DeletePermissionRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeletePermissionResponse {}

////////////////////////////////////////////////////////////////////////////////
// Role management
//////

message ListRolesRequest {}

message ListRolesResponse {
  repeated iam.Role roles = 1;
}

message GetRoleRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetRoleResponse {
  iam.RoleDetail role = 1;
}

message CreateRoleRequest {
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
}

message CreateRoleResponse {
  iam.Role role = 1;
}

message PatchRoleRequest {
  string id            = 1 [(buf.validate.field).string.uuid = true];
  optional string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
}

message PatchRoleResponse {
  iam.Role role = 1;
}

message DeleteRoleRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteRoleResponse {}

////////////////////////////////////////////////////////////////////////////////
// Role ↔ Permission bindings
//////

message SetRolePermissionsRequest {
  string role_id                 = 1 [(buf.validate.field).string.uuid = true];
  repeated string permission_ids = 2 [(buf.validate.field).repeated.items.string.uuid = true];
}

message SetRolePermissionsResponse {
  iam.RoleDetail role = 1;
}

////////////////////////////////////////////////////////////////////////////////
// Group management
//////

message ListGroupsRequest {}

message ListGroupsResponse {
  repeated iam.Group groups = 1;
}

message GetGroupRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetGroupResponse {
  iam.GroupDetail group = 1;
}

message CreateGroupRequest {
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
}

message CreateGroupResponse {
  iam.Group group = 1;
}

message PatchGroupRequest {
  string id            = 1 [(buf.validate.field).string.uuid = true];
  optional string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
}

message PatchGroupResponse {
  iam.Group group = 1;
}

message DeleteGroupRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteGroupResponse {}

////////////////////////////////////////////////////////////////////////////////
// Group ↔ Role bindings
//////

message SetGroupRolesRequest {
  string group_id          = 1 [(buf.validate.field).string.uuid = true];
  repeated string role_ids = 2 [(buf.validate.field).repeated.items.string.uuid = true];
}

message SetGroupRolesResponse {
  iam.GroupDetail group = 1;
}

////////////////////////////////////////////////////////////////////////////////
// User management
//////

message ListUsersRequest {}

message ListUsersResponse {
  repeated iam.User users = 1;
}

message CreateUserRequest {
  string email       = 1 [(buf.validate.field).string.email = true];
  string given_name  = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  string family_name = 3 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
}

message CreateUserResponse {
  iam.User user = 1;
}

message GetUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetUserResponse {
  iam.UserDetail user = 1;
}

message PatchUserRequest {
  string id                   = 1 [(buf.validate.field).string.uuid = true];
  optional string given_name  = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  optional string family_name = 3 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  optional string email       = 4 [(buf.validate.field).string = {email: true}];
  optional bool active        = 5;
}

message PatchUserResponse {
  iam.User user = 1;
}

message DeleteUserRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteUserResponse {}

////////////////////////////////////////////////////////////////////////////////
// Group members
//////

message ListGroupUsersRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
}

message ListGroupUsersResponse {
  repeated iam.User users = 1;
}

////////////////////////////////////////////////////////////////////////////////
// User ↔ Group bindings
//////

message AddUserToGroupRequest {
  string user_id  = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
}

message AddUserToGroupResponse {}

message RemoveUserFromGroupRequest {
  string user_id  = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
}

message RemoveUserFromGroupResponse {}

////////////////////////////////////////////////////////////////////////////////
// User ↔ Role / Group (set)
//////

message SetUserRolesRequest {
  string user_id           = 1 [(buf.validate.field).string.uuid = true];
  repeated string role_ids = 2 [(buf.validate.field).repeated.items.string.uuid = true];
}

message SetUserRolesResponse {
  iam.UserDetail user = 1;
}

message SetUserGroupsRequest {
  string user_id            = 1 [(buf.validate.field).string.uuid = true];
  repeated string group_ids = 2 [(buf.validate.field).repeated.items.string.uuid = true];
}

message SetUserGroupsResponse {
  iam.UserDetail user = 1;
}

////////////////////////////////////////////////////////////////////////////////
// Passkey management
//////

message ListPasskeysRequest {
  optional string user_id = 1 [(buf.validate.field).string = {uuid: true}];
}

message ListPasskeysResponse {
  repeated iam.Passkey passkeys = 1;
}

message DeletePasskeyRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeletePasskeyResponse {}

////////////////////////////////////////////////////////////////////////////////
// Service management
//////

message ListServicesRequest {}

message ListServicesResponse {
  repeated iam.Service services = 1;
}

message GetServiceRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetServiceResponse {
  iam.ServiceDetail service = 1;
}

message CreateServiceRequest {
  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
}

message CreateServiceResponse {
  iam.Service service = 1;
}

message DeleteServiceRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteServiceResponse {}

message AddServiceSecretRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message AddServiceSecretResponse {
  iam.ServiceDetail service = 1;
}

message ActivateServiceSecretRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message ActivateServiceSecretResponse {}

message DeactivateServiceSecretRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeactivateServiceSecretResponse {}

message DeleteServiceSecretRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteServiceSecretResponse {}
