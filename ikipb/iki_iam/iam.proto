syntax = "proto3";

option go_package = "github.com/ikithomas/iki-proto/ikipb/iki_iam";
option ruby_package = "Iki::Iam";

package iam;

// User is a human user
message User {
  reserved 5, 6, 7, 8;

  string id = 1;
  string email = 2;
  string given_name = 3;
  string family_name = 4;

  bool active = 9;
  optional int64 last_login_at = 10;
  optional int64 last_activity_at = 11;
  optional int64 scim_last_synced_at = 12;
}

message UserDetail {
  User user = 1;

  repeated Group groups = 2;

  // Roles assigned directly to the user (via account_iam_role).
  repeated Role direct_roles = 3;

  // Union of all roles from group memberships and direct assignments.
  repeated Role effective_roles = 4;
}

message Permission {
  string id          = 1;
  string name        = 2;
  string external_id = 3;
}

message Role {
  string id   = 1;
  string name = 2;
}

message RoleDetail {
  Role role                        = 1;
  repeated Permission permissions  = 2;
}

message Group {
  string id   = 1;
  string name = 2;
}

message GroupDetail {
  Group group          = 1;
  repeated Role roles  = 2;
}

// Service is a microservice
message Service {
  string id        = 1;
  string client_id = 2;
  string name      = 4;
}

message ServiceDetail {
  Service service          = 1;
  repeated Secret secrets  = 2;
}

message Secret {
  string id = 1;
  string secret = 2;
  int64 last_used_at = 3;
  bool active = 4;
}

message Passkey {
  string id                 = 1;
  string owner_id           = 2;
  string owner_name         = 3;
  string identifier         = 4;
  int64 created_at          = 5;
  optional int64 last_used_at = 6;
  string owner_email        = 7;
  string name               = 8;
}

enum EntityType {
  ENTITY_TYPE_UNSPECIFIED = 0;
  ENTITY_TYPE_USER = 1;
  ENTITY_TYPE_SERVICE = 2;
}
