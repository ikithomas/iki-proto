syntax = "proto3";

import "buf/validate/validate.proto";
import "ikipb/iki_iam/iam.proto";

option go_package = "/tokensvc";
option ruby_package = "Iki::Iam::TokenSvc";

package tokensvc;

service TokenSvc {
  rpc GetJwkset(GetJwksetRequest) returns (GetJwksetResponse) {}
  rpc AccessToken(AccessTokenRequest) returns (AccessTokenResponse) {}
}

message GetJwksetRequest{}
message GetJwksetResponse{
  bytes jwkset = 1;
}

message AccessTokenRequest {
  optional string refresh_token = 1 [(buf.validate.field).string.min_len = 1];
  iam.EntityType entity_type = 2 [(buf.validate.field).enum.defined_only = true];
}

message AccessTokenResponse {
  string access_token = 1;
}
